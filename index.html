<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renato Silva - Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000; /* black background */
      color: #fff; /* white text */
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      color: #fff;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #ccc; /* softer gray for tagline */
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* Minimal black & white button styles */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 8px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.3s ease;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn--primary {
      background: #fff; /* white button */
      color: #000; /* black text */
      box-shadow: 0 5px 15px rgba(255,255,255,0.1);
    }

    .btn--primary:hover {
      background: #ccc;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255,255,255,0.2);
    }

    .btn--stroke {
      border: 2px solid #fff; /* white border */
      color: #fff;
      background: transparent;
    }

    .btn--stroke:hover {
      background: #fff;
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255,255,255,0.2);
    }

    footer {
      margin-top: 50px;
      font-size: 0.9rem;
      color: #777;
    }

    footer a {
      color: #fff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello!</h1>
    <p>Communication · Digital Marketing · Multimedia Design</p>

    <div class="buttons">
      <a href="CV_RenatoSilva.pdf" target="_blank" class="btn btn--primary">📄 Curriculum Vitae</a>
      <a href="PORT_RenatoSilva.pdf" class="btn btn--stroke">💼 Portfolio</a>
    </div>
  </div>
</body>
</html>
